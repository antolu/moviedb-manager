name: Pre-commit CI Lite

on:
  push:
    branches: [ master ]
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    branches: [ master ]

permissions:
  contents: write

jobs:
  pre-commit-ci-lite:
    # Only run on labeled trigger or standard triggers
    if: "github.event.action != 'labeled' || github.event.label.name == 'pre-commit ci run'"
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Remove label if present
      if: github.event.action == 'labeled' && github.event.label.name == 'pre-commit ci run'
      run: gh pr edit ${{ github.event.number }} --remove-label 'pre-commit ci run'
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.14"

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "22"

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[test,dev]"

    - name: Install Frontend dependencies
      run: |
        cd frontend && npm ci

    - name: Run pre-commit
      uses: pre-commit/action@v3.0.1

    - name: Run Linting (ruff)
      if: always()
      run: |
        ruff check --config pyproject.toml --output-format=github .
        ruff format --config pyproject.toml --check .

    - name: Run Type Checking (mypy)
      if: always()
      run: |
        mypy --config-file pyproject.toml moviedb_manager/

    - name: Pre-commit CI Lite Auto-fix
      uses: pre-commit-ci/lite-action@v1.1.0
      if: always()
