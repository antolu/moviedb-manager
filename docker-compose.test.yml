# Isolated test environment
# Usage: ./dev.sh test

services:
  db:
    image: postgres:17-alpine
    container_name: moviedb-db-test
    environment:
      - POSTGRES_USER=testuser
      - POSTGRES_PASSWORD=testpassword
      - POSTGRES_DB=testdb
    tmpfs:
      - /var/lib/postgresql/data
    networks:
      - test-network

  redis:
    image: redis:7-alpine
    container_name: moviedb-redis-test
    networks:
      - test-network

  app:
    build:
      context: .
      args:
        BUILD_TYPE: development
    container_name: moviedb-app-test
    environment:
      - MOVIEDB_DATABASE_HOST=db
      - MOVIEDB_DATABASE_PORT=5432
      - MOVIEDB_DATABASE_USER=testuser
      - MOVIEDB_DATABASE_PASSWORD=testpassword
      - MOVIEDB_DATABASE_NAME=testdb
      - MOVIEDB_REDIS_URL=redis://redis:6379/0
      - MOVIEDB_QBITTORRENT_HOST=qbittorrent
      - MOVIEDB_QBITTORRENT_PORT=8080
      - MOVIEDB_QBITTORRENT_USER=admin
      - MOVIEDB_QBITTORRENT_PASSWORD=adminadmin
      - ENVIRONMENT=test
    volumes:
      - ./moviedb_manager:/app/moviedb_manager
      - ./tests:/app/tests
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    depends_on:
      - db
      - redis
    networks:
      - test-network

  test-runner:
    build:
      context: .
      args:
        BUILD_TYPE: development
    container_name: moviedb-test-runner
    environment:
      - MOVIEDB_DATABASE_HOST=db
      - MOVIEDB_DATABASE_PORT=5432
      - MOVIEDB_DATABASE_USER=testuser
      - MOVIEDB_DATABASE_PASSWORD=testpassword
      - MOVIEDB_DATABASE_NAME=testdb
      - MOVIEDB_REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=test
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
      - app
    networks:
      - test-network
    command: ["pytest", "tests/"]

networks:
  test-network:
    driver: bridge
