# Isolated test environment
# Usage: ./dev.sh test

services:
  db:
    image: postgres:17-alpine
    container_name: moviedb-db-test
    environment:
      - POSTGRES_USER=testuser
      - POSTGRES_PASSWORD=testpassword
      - POSTGRES_DB=testdb
    tmpfs:
      - /var/lib/postgresql/data
    networks:
      - test-network

  redis:
    image: redis:7-alpine
    container_name: moviedb-redis-test
    networks:
      - test-network

  app:
    build:
      context: .
      args:
        BUILD_TYPE: development
    container_name: moviedb-app-test
    environment:
      - MOVIEDB_DATABASE__HOST=db
      - MOVIEDB_DATABASE__PORT=5432
      - MOVIEDB_DATABASE__USER=testuser
      - MOVIEDB_DATABASE__PASSWORD=testpassword
      - MOVIEDB_DATABASE__NAME=testdb
      - MOVIEDB_REDIS__URL=redis://redis:6379/0
      - MOVIEDB_QBITTORRENT__HOST=qbittorrent
      - MOVIEDB_QBITTORRENT__PORT=8080
      - MOVIEDB_QBITTORRENT__USER=admin
      - MOVIEDB_QBITTORRENT__PASSWORD=adminadmin
      - ENVIRONMENT=test
    volumes:
      - ./moviedb_manager:/app/moviedb_manager
      - ./tests:/app/tests
    depends_on:
      - db
      - redis
    networks:
      - test-network

  test-runner:
    build:
      context: .
      args:
        BUILD_TYPE: development
    container_name: moviedb-test-runner
    environment:
      - MOVIEDB_DATABASE__HOST=db
      - MOVIEDB_DATABASE__PORT=5432
      - MOVIEDB_DATABASE__USER=testuser
      - MOVIEDB_DATABASE__PASSWORD=testpassword
      - MOVIEDB_DATABASE__NAME=testdb
      - MOVIEDB_REDIS__URL=redis://redis:6379/0
      - ENVIRONMENT=test
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
      - app
    networks:
      - test-network
    command: ["pytest", "tests/"]

networks:
  test-network:
    driver: bridge
